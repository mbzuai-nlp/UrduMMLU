# ============================================================
# Text LLM 0-Shot Experiment Configuration
# ============================================================
# Enable/disable individual models by setting `enabled: true/false`
# Run: python src/run_text_experiment.py --config config_text.yaml

# -------------------- Experiment Settings --------------------
experiment:
  limit: 10 # null = all samples; integer = first N samples
  batch_size: 10 # concurrent API requests (API models only)
  prompt_language:
    ur # "en" for English prompt, "ur" for Urdu prompt
    # Output is written to output/en or output/ur

# -------------------- Data ----------------------------------
data:
  metadata_path: data/26-hf/mcqs.json

# -------------------- Prompts (0-shot) -----------------------
# Two prompt sets: English (en) and Urdu (ur).
# Switch between them via experiment.prompt_language above.

prompts:
  en:
    system: |
      You are an expert multiple-choice question answering assistant.
      Read the question carefully and select the single best answer.
      Respond with only the letter of the correct option: A, B, C, or D.
      Do not add any explanation, preamble, or punctuation beyond the letter.
    user_template: |
      Subject: {domain} – {subdomain} | Level: {level}

      Question: {question}

      A) {A}
      B) {B}
      C) {C}
      D) {D}

      Answer (A, B, C, or D):

  ur:
    system: |
      آپ ایک ماہر MCQ جوابدہ معاون ہیں۔
      سوال کو غور سے پڑھیں اور صرف صحیح آپشن کا حرف لکھیں: A، B، C یا D۔
      صرف ایک حرف لکھیں۔ کوئی وضاحت، تمہید یا اضافی الفاظ نہ لکھیں۔
    user_template: |
      مضمون: {domain} – {subdomain} | سطح: {level}

      سوال: {question}

      A) {A}
      B) {B}
      C) {C}
      D) {D}

      جواب (A، B، C یا D):

# -------------------- Models ---------------------------------
# Each entry specifies one model to run.
# Multiple entries with the same provider are allowed.

models:
  # ── Gemini ─────────────────────────────────────────────────
  - provider: gemini
    enabled: false
    name: gemini-3.1-flash-lite
    temperature: 0
    max_output_tokens: 8192

  - provider: gemini
    enabled: false
    name: gemini-3.5-flash
    temperature: 0
    max_output_tokens: 8192

  # ── OpenAI GPT ─────────────────────────────────────────────
  - provider: gpt
    enabled: true
    name: gpt-5.4-mini
    temperature: 1.0
    max_completion_tokens: 32768
    reasoning_effort: "high"

  - provider: gpt
    enabled: true
    name: gpt-5.4
    temperature: 1.0
    max_completion_tokens: 8192
    reasoning_effort: "high"

  # ── Anthropic Claude ───────────────────────────────────────
  - provider: claude
    enabled: false
    name: claude-haiku-4-5
    temperature: 0
    max_tokens: 8192

  - provider: claude
    enabled: false
    name: claude-sonnet-4-6
    temperature: 0
    max_tokens: 8192

  - provider: claude
    enabled: false
    name: claude-opus-4-7
    temperature: 0
    max_tokens: 8192

  # ── HuggingFace Inference API (cloud, requires HF_TOKEN) ──────
  # Uses https://router.huggingface.co/v1 (OpenAI-compatible).
  # Set hf_router to the inference provider slug (e.g. novita, together, fireworks).
  # If hf_router is omitted the model name is sent as-is.
  - provider: hf_inference
    enabled: false
    name: Qwen/Qwen3.5-397B-A17B
    hf_router: novita
    temperature: 0
    max_completion_tokens: 16

  - provider: hf_inference
    enabled: false
    name: deepseek-ai/DeepSeek-V3
    hf_router: novita
    temperature: 0
    max_completion_tokens: 16

  # ── HuggingFace Text LLMs (run locally, no server required) ─
  # Set device: "cuda", "mps", "cpu", or "auto"
  # Set dtype: "float16", "bfloat16", or "float32"
  # Set load_in_4bit: true for 4-bit quantization (requires bitsandbytes)
  # Set load_in_8bit: true for 8-bit quantization (requires bitsandbytes)
  - provider: huggingface
    enabled: false
    name: meta-llama/Llama-3.2-1B
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: Qwen/Qwen2.5-7B-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  # ── Urdu-specialized: Qalb Urdu Llama 3.1 ───────────────────
  - provider: huggingface
    enabled: false
    name: enstazao/Qalb-1.0-8B-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  # ── Google Gemma family ────────────────────────────────────
  - provider: huggingface
    enabled: false
    name: google/gemma-3-4b-it
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: google/gemma-4-31B-it
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true # 4-bit quantization for large models (requires bitsandbytes)
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: google/gemma-4-26B-A4B-it
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true # 4-bit quantization for large models (requires bitsandbytes)
    load_in_8bit: false

  # ── Qwen family: multilingual / UrduMMLU baselines ─────────
  - provider: huggingface
    enabled: false
    name: Qwen/Qwen3.6-27B
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: Qwen/Qwen3.6-35B-A3B
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  # Base model: useful as a control, but not ideal for prompt-following MCQ.
  - provider: huggingface
    enabled: false
    name: Qwen/Qwen3.5-2B-Base
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: Qwen/Qwen3.5-397B-A17B
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  # ── DeepSeek family ────────────────────────────────────────
  # Very large MoE models. Use Inference Provider API.
  - provider: huggingface
    enabled: false
    name: deepseek-ai/DeepSeek-V4-Flash
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: deepseek-ai/DeepSeek-V4-Pro
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: deepseek-ai/DeepSeek-V3.2
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: deepseek-ai/DeepSeek-R1
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  # ── Mistral Ministral 3 family ─────────────────────────────
  - provider: huggingface
    enabled: false
    name: mistralai/Ministral-3-14B-Instruct-2512
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: mistralai/Ministral-3-8B-Instruct-2512
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: mistralai/Ministral-3-3B-Instruct-2512
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  # Reasoning variant: useful, but may output reasoning text unless constrained.
  - provider: huggingface
    enabled: false
    name: mistralai/Ministral-3-14B-Reasoning-2512
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: true
    load_in_8bit: false

  # ── Urdu-specialized / South Asian LLMs ────────────────────
  - provider: huggingface
    enabled: false
    name: large-traversaal/Alif-1.0-8B-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  # ── Microsoft Phi family: compact baselines ────────────────
  - provider: huggingface
    enabled: false
    name: microsoft/Phi-4-mini-instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: microsoft/Phi-3.5-mini-instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false

  # Base model, not instruction-tuned. Keep disabled unless used as a control.
  - provider: huggingface
    enabled: false
    name: microsoft/phi-2
    device: auto
    dtype: bfloat16
    max_new_tokens: 16
    load_in_4bit: false
    load_in_8bit: false
