# ============================================================
# Text LLM 0-Shot Experiment Configuration
# ============================================================
# Enable/disable individual models by setting `enabled: true/false`
# Run: python src/run_text_experiment.py --config config_text.yaml

# -------------------- Experiment Settings --------------------
experiment:
  limit: null # null = all samples; integer = first N samples
  batch_size: 20 # concurrent API requests (API models only)
  prompt_language: # list of languages to run; output written to output/<lang>
    - ur
    - en

# -------------------- Data ----------------------------------
data:
  metadata_path: data/26-eval/mcqs.json

# -------------------- Prompts (0-shot) -----------------------
# Two prompt sets: English (en) and Urdu (ur).
# Switch between them via experiment.prompt_language above.

prompts:
  en:
    system: |
      You are an expert multiple-choice question answering assistant.
      Read the question carefully and select the single best answer.

      Respond in EXACTLY this two-line format, with no extra text:

      Answer key: <one of A, B, C, D>
      Answer text: <verbatim text of the chosen option, copied character-for-character>

      Do not add explanations, preambles, markdown, or punctuation
      outside of the format. The Answer text must match the option text
      exactly so the response can be parsed programmatically.
    user_template: |
      Subject: {domain} – {subdomain} | Level: {level}

      Question: {question}

      A) {A}
      B) {B}
      C) {C}
      D) {D}

      Answer key:
      Answer text:

  ur:
    system: |
      آپ ایک ماہر MCQ جوابدہ معاون ہیں۔
      سوال کو غور سے پڑھیں اور صحیح آپشن منتخب کریں۔

      جواب بالکل اس دو سطری شکل میں دیں، کوئی اضافی متن شامل نہ کریں:

      Answer key: <A، B، C یا D میں سے ایک>
      Answer text: <منتخب آپشن کا متن من و عن، حرف بہ حرف نقل کریں>

      کوئی وضاحت، تمہید، مارک ڈاؤن، یا اضافی الفاظ نہ لکھیں۔
      Answer text کو آپشن کے متن سے بالکل مماثل ہونا چاہیے تاکہ پروگرام
      اسے درست طور پر پارس کر سکے۔
    user_template: |
      مضمون: {domain} – {subdomain} | سطح: {level}

      سوال: {question}

      A) {A}
      B) {B}
      C) {C}
      D) {D}

      Answer key:
      Answer text:

# -------------------- Models ---------------------------------
# Each entry specifies one model to run.
# Multiple entries with the same provider are allowed.

models:
  # ── Gemini ─────────────────────────────────────────────────
  # Gemini 3.x: dynamic thinking is always on (cannot disable);
  # budget covers thinking + final 2-line answer.
  - provider: gemini
    enabled: false
    name: gemini-3.1-flash-lite
    temperature: 0
    max_output_tokens: 4096

  - provider: gemini
    enabled: false
    name: gemini-3.5-flash
    temperature: 0
    max_output_tokens: 4096

  # ── OpenAI GPT ─────────────────────────────────────────────
  # GPT-5.x reasoning models: reasoning_tokens count against max_completion_tokens.
  - provider: gpt
    enabled: false
    name: gpt-5.4-mini
    temperature: 1.0
    max_completion_tokens: 8192
    reasoning_effort: "high"

  - provider: gpt
    enabled: false
    name: gpt-5.4
    temperature: 1.0
    max_completion_tokens: 8192
    reasoning_effort: "high"

  # ── Anthropic Claude ───────────────────────────────────────
  # Haiku 4.5: manual extended thinking, off by default → 2-line answer fits in 256.
  # Sonnet 4.6 / Opus 4.7: adaptive thinking on by default (high / xhigh effort).
  - provider: claude
    enabled: false
    name: claude-haiku-4-5
    temperature: 0
    max_tokens: 256

  - provider: claude
    enabled: false
    name: claude-sonnet-4-6
    temperature: 0
    max_tokens: 8192

  - provider: claude
    enabled: false
    name: claude-opus-4-7
    temperature: 0
    max_tokens: 8192

  # ── HuggingFace Inference API (cloud, requires HF_TOKEN) ──────
  # Uses https://router.huggingface.co/v1 (OpenAI-compatible).
  # Set hf_router to the inference provider slug (e.g. novita, together, fireworks).
  # If hf_router is omitted the model name is sent as-is.
  # Qwen3.x: thinking mode is ON by default. Either bump max tokens or
  # add ``/no_think`` to the prompt to keep responses to the 2-line format.
  - provider: hf_inference
    enabled: false
    name: Qwen/Qwen3.5-397B-A17B
    hf_router: novita
    temperature: 0
    max_completion_tokens: 4096

  # DeepSeek-V4-Flash: emits reasoning/thinking tokens by default that
  # count against the budget — needs headroom for the chain plus the
  # 2-line answer.
  - provider: hf_inference
    enabled: false
    name: deepseek-ai/DeepSeek-V4-Flash
    hf_router: novita
    temperature: 0
    max_completion_tokens: 4096

  # Llama 3.3 70B Instruct via Novita (no local download / no gated weights).
  - provider: hf_inference
    enabled: false
    name: meta-llama/Llama-3.3-70B-Instruct
    hf_router: novita
    temperature: 0
    max_completion_tokens: 96

  # Qwen3.6-27B via Novita. Thinking is ON by default — 4096 covers
  # the reasoning chain + final 2-line answer (or add ``/no_think``).
  - provider: hf_inference
    enabled: false
    name: Qwen/Qwen3.6-35B-A3B
    hf_router: deepinfra
    temperature: 0
    max_completion_tokens: 4096

  # ── OpenRouter (cloud, requires OPENROUTER_API_KEY) ───────────
  # https://openrouter.ai/  — OpenAI-compatible at
  # https://openrouter.ai/api/v1. Use the model slug from the URL.
  # Optional: pin/order upstream providers with `provider_routing`,
  # see https://openrouter.ai/docs/provider-routing
  - provider: openrouter
    enabled: false
    name: meta-llama/llama-4-maverick
    temperature: 0
    max_completion_tokens: 96
    # provider_routing:
    #   order: ["fireworks", "together"]
    #   allow_fallbacks: false

  # Qwen3.6-27B: thinking on by default. ``/no_think`` only works when
  # the upstream provider uses Qwen3's chat template — OpenRouter may
  # route elsewhere, so disable via OpenRouter's unified reasoning flag.
  # The suffix is kept as a belt-and-braces backup.
  - provider: openrouter
    enabled: true
    name: qwen/qwen3.6-27b
    temperature: 0
    max_completion_tokens: 96
    user_prompt_suffix: "/no_think"
    reasoning:
      enabled: false

  # ── HuggingFace Text LLMs (run locally, no server required) ─
  # Set device: "cuda", "mps", "cpu", or "auto"
  # Set dtype: "float16", "bfloat16", or "float32"
  # Set load_in_4bit: true for 4-bit quantization (requires bitsandbytes)
  # Set load_in_8bit: true for 8-bit quantization (requires bitsandbytes)

  # ── Urdu-specialized: Qalb Urdu Llama 3.1 ───────────────────
  - provider: huggingface
    enabled: false
    name: enstazao/Qalb-1.0-8B-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  # ── Google Gemma family ────────────────────────────────────
  - provider: huggingface
    enabled: false
    name: google/gemma-3-4b-it
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: google/gemma-4-31B-it
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true # 4-bit quantization for large models (requires bitsandbytes)
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: google/gemma-4-26B-A4B-it
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true # 4-bit quantization for large models (requires bitsandbytes)
    load_in_8bit: false

  # ── Qwen family: multilingual / UrduMMLU baselines ─────────
  # Qwen3.x: thinking is on by default — needs headroom unless prompt
  # carries ``/no_think``.
  - provider: huggingface
    enabled: false
    name: Qwen/Qwen3.6-27B
    device: auto
    dtype: bfloat16
    max_new_tokens: 4096
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: Qwen/Qwen3.6-35B-A3B
    device: auto
    dtype: bfloat16
    max_new_tokens: 4096
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: Qwen/Qwen3.5-397B-A17B
    device: auto
    dtype: bfloat16
    max_new_tokens: 4096
    load_in_4bit: true
    load_in_8bit: false

  # ── DeepSeek family ────────────────────────────────────────
  # Very large MoE models. Use Inference Provider API.
  - provider: huggingface
    enabled: false
    name: deepseek-ai/DeepSeek-V4-Flash
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: deepseek-ai/DeepSeek-V4-Pro
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: deepseek-ai/DeepSeek-V3.2
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true
    load_in_8bit: false

  # DeepSeek-R1: dedicated reasoning model. ~8k recommended max
  # (quality degrades above per Bedrock docs).
  - provider: huggingface
    enabled: false
    name: deepseek-ai/DeepSeek-R1
    device: auto
    dtype: bfloat16
    max_new_tokens: 8192
    load_in_4bit: true
    load_in_8bit: false

  # ── Mistral Ministral 3 family ─────────────────────────────
  - provider: huggingface
    enabled: false
    name: mistralai/Ministral-3-14B-Instruct-2512
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: mistralai/Ministral-3-8B-Instruct-2512
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: mistralai/Ministral-3-3B-Instruct-2512
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  # Reasoning variant: dedicated CoT model — needs full thinking budget.
  - provider: huggingface
    enabled: false
    name: mistralai/Ministral-3-14B-Reasoning-2512
    device: auto
    dtype: bfloat16
    max_new_tokens: 8192
    load_in_4bit: true
    load_in_8bit: false

  # ── Urdu-specialized / South Asian LLMs ────────────────────
  - provider: huggingface
    enabled: false
    name: large-traversaal/Alif-1.0-8B-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  # ── Microsoft Phi family: compact baselines ────────────────
  - provider: huggingface
    enabled: false
    name: microsoft/Phi-4-mini-instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  # Phi-4-mini-reasoning: dedicated chain-of-thought variant
  # (math-heavy training). 32K max_new_tokens per Microsoft's own examples.
  - provider: huggingface
    enabled: false
    name: microsoft/Phi-4-mini-reasoning
    device: auto
    dtype: bfloat16
    max_new_tokens: 32768
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: microsoft/Phi-3.5-mini-instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  # phi-2: 2.7B research/base model, NOT instruction-tuned and only a
  # 2,048-token context window — long MCQs may overflow. Keep disabled
  # unless used as a control.
  - provider: huggingface
    enabled: false
    name: microsoft/phi-2
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  - provider: huggingface
    enabled: false
    name: Qwen/Qwen3.5-2B-Base
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  # meta-llama/Llama-3.2-3B-Instruct
  - provider: huggingface
    enabled: false
    name: meta-llama/Llama-3.2-3B-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: false
    load_in_8bit: false

  # meta-llama/Llama-3.3-70B-Instruct (local) — gated repo, requires Meta
  # license + HF token with gated-repo access. Prefer the ``hf_inference``
  # entry above (routes via Novita; no gating).
  - provider: huggingface
    enabled: false
    name: meta-llama/Llama-3.3-70B-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true
    load_in_8bit: false

  # meta-llama/Llama-4-Maverick-17B-128E-Instruct
  - provider: huggingface
    enabled: false
    name: meta-llama/Llama-4-Maverick-17B-128E-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true
    load_in_8bit: false

  # meta-llama/Llama-4-Scout-17B-16E-Instruct
  - provider: huggingface
    enabled: false
    name: meta-llama/Llama-4-Scout-17B-16E-Instruct
    device: auto
    dtype: bfloat16
    max_new_tokens: 96
    load_in_4bit: true
    load_in_8bit: false
