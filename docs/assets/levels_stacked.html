<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
html,body{margin:0;padding:0;background:transparent;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:#1a1a1a;}
body{width:960px;height:520px;}
#tip{position:fixed;display:none;z-index:999;background:rgba(255,255,255,0.97);border:1px solid #ddd;border-radius:10px;padding:9px 13px;font-size:12.5px;line-height:1.6;box-shadow:0 6px 24px rgba(0,0,0,.09);pointer-events:none;}
</style></head><body>
<svg id="c" width="960" height="520"></svg><div id="tip"></div>
<script>
const PALETTE={"Humanities":"#3C7C2A","Social Sciences":"#75A93D","STEM":"#B5C941","Other":"#D6A640","Profession":"#DF7A45"};
function hexToRgb(h){h=h.replace("#","");return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function shade(hex,f){const[r,g,b]=hexToRgb(hex);const m=c=>Math.round(c+(255-c)*f);const x=n=>n.toString(16).padStart(2,"0");return"#"+x(m(r))+x(m(g))+x(m(b));}
function darken(hex,f){const[r,g,b]=hexToRgb(hex);const m=c=>Math.round(c*(1-f));const x=n=>n.toString(16).padStart(2,"0");return"#"+x(m(r))+x(m(g))+x(m(b));}
const SVG="http://www.w3.org/2000/svg";
function s(tag,attrs){const e=document.createElementNS(SVG,tag);Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));return e;}
const tip=document.getElementById("tip");
function showTip(html,e){tip.innerHTML=html;tip.style.display="block";tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-8)+"px";}
function moveTip(e){tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-8)+"px";}
function hideTip(){tip.style.display="none";}

const LEVELS=[
  {level:"SSC-I",   total:11601,H:6276, SS:1266,STEM:2942,O:683, P:434},
  {level:"SSC-II",  total:6838, H:2953, SS:1222,STEM:2155,O:274, P:234},
  {level:"HSSC-I",  total:3867, H:993,  SS:2549,STEM:232, O:58,  P:35},
  {level:"HSSC-II", total:4125, H:788,  SS:2931,STEM:280, O:81,  P:45},
];
const DOMAINS=[
  {key:"H",   label:"Humanities",      col:PALETTE["Humanities"]},
  {key:"SS",  label:"Social Sciences", col:PALETTE["Social Sciences"]},
  {key:"STEM",label:"STEM",            col:PALETTE["STEM"]},
  {key:"O",   label:"Other",           col:PALETTE["Other"]},
  {key:"P",   label:"Profession",      col:PALETTE["Profession"]},
];
const svg=document.getElementById("c");
const W=960,H=520,ML=65,MR=140,MT=50,MB=65,LGAP=30;
const PW=(W-ML-MR-LGAP)/2,CH=H-MT-MB;
const maxTotal=11601;
const GSPACE=PW/4;
const BW=GSPACE*0.55;

const tt=s("text",{x:W/2,y:26,"text-anchor":"middle","font-size":14,"font-weight":700,fill:"#1a1a1a"});
tt.textContent="MCQ Distribution across Examination Levels";svg.appendChild(tt);
const la=s("text",{x:ML+PW/2,y:44,"text-anchor":"middle","font-size":11,fill:"#888"});
la.textContent="# of MCQs";svg.appendChild(la);
const lb=s("text",{x:ML+PW+LGAP+PW/2,y:44,"text-anchor":"middle","font-size":11,fill:"#888"});
lb.textContent="Share of level (%)";svg.appendChild(lb);

for(let v=0;v<=12000;v+=3000){
  const y=MT+CH*(1-v/maxTotal);
  svg.appendChild(s("line",{x1:ML,y1:y,x2:ML+PW,y2:y,stroke:"#e8e8e8","stroke-width":1,"stroke-dasharray":v===0?"none":"4 3"}));
  const t=s("text",{x:ML-8,y:y+4,"text-anchor":"end","font-size":10,fill:"#888"});t.textContent=(v/1000)+"k";svg.appendChild(t);
}
LEVELS.forEach(function(d,i){
  const bx=ML+i*GSPACE+(GSPACE-BW)/2;
  let sy=MT+CH;
  DOMAINS.forEach(function(dom){
    const v=d[dom.key]||0,bh=CH*(v/maxTotal);
    sy-=bh;
    const r=s("rect",{x:bx,y:sy,width:BW,height:bh,fill:shade(dom.col,0.3),stroke:darken(dom.col,0.12),"stroke-width":1});
    if(bh>14){const vl=s("text",{x:bx+BW/2,y:sy+bh/2+4,"text-anchor":"middle","font-size":10,"font-weight":600,fill:darken(dom.col,0.38)});vl.textContent=v.toLocaleString();svg.appendChild(vl);}
    r.addEventListener("mouseenter",function(e){showTip("<b>"+d.level+"</b> — "+dom.label+"<br/>MCQs: <b>"+v.toLocaleString()+"</b> ("+Math.round(v/d.total*100)+"%)",e);});
    r.addEventListener("mousemove",moveTip);r.addEventListener("mouseleave",hideTip);
    svg.appendChild(r);
  });
  const tot=s("text",{x:bx+BW/2,y:MT+CH*(1-d.total/maxTotal)-8,"text-anchor":"middle","font-size":11,"font-weight":700,fill:"#333"});
  tot.textContent=d.total.toLocaleString();svg.appendChild(tot);
  const xl=s("text",{x:bx+BW/2,y:MT+CH+18,"text-anchor":"middle","font-size":12,"font-weight":600,fill:"#333"});
  xl.textContent=d.level;svg.appendChild(xl);
});

const PX=ML+PW+LGAP;
for(let v=0;v<=100;v+=25){
  const y=MT+CH*(1-v/100);
  svg.appendChild(s("line",{x1:PX,y1:y,x2:PX+PW,y2:y,stroke:"#e8e8e8","stroke-width":1,"stroke-dasharray":v===0?"none":"4 3"}));
  const t=s("text",{x:PX-8,y:y+4,"text-anchor":"end","font-size":10,fill:"#888"});t.textContent=v+"%";svg.appendChild(t);
}
LEVELS.forEach(function(d,i){
  const bx=PX+i*GSPACE+(GSPACE-BW)/2;
  let sy=MT+CH;
  DOMAINS.forEach(function(dom){
    const v=d[dom.key]||0,pct=v/d.total,bh=CH*pct;
    sy-=bh;
    const r=s("rect",{x:bx,y:sy,width:BW,height:bh,fill:shade(dom.col,0.3),stroke:darken(dom.col,0.12),"stroke-width":1});
    if(bh>14){const vl=s("text",{x:bx+BW/2,y:sy+bh/2+4,"text-anchor":"middle","font-size":10,"font-weight":600,fill:darken(dom.col,0.38)});vl.textContent=Math.round(pct*100)+"%";svg.appendChild(vl);}
    r.addEventListener("mouseenter",function(e){showTip("<b>"+d.level+"</b> — "+dom.label+"<br/>"+Math.round(pct*100)+"% of level ("+v.toLocaleString()+" MCQs)",e);});
    r.addEventListener("mousemove",moveTip);r.addEventListener("mouseleave",hideTip);
    svg.appendChild(r);
  });
  const xl=s("text",{x:bx+BW/2,y:MT+CH+18,"text-anchor":"middle","font-size":12,"font-weight":600,fill:"#333"});
  xl.textContent=d.level;svg.appendChild(xl);
});

const lx=W-MR+12,ly=MT+10;
DOMAINS.forEach(function(dom,i){
  svg.appendChild(s("rect",{x:lx,y:ly+i*24,width:13,height:13,rx:3,fill:shade(dom.col,0.3),stroke:darken(dom.col,0.15),"stroke-width":1.5}));
  const lt=s("text",{x:lx+19,y:ly+i*24+11,"font-size":11,"font-weight":600,fill:darken(dom.col,0.4)});lt.textContent=dom.label;svg.appendChild(lt);
});
</script></body></html>
