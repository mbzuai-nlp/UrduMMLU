<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
html,body{margin:0;padding:0;background:transparent;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:#1a1a1a;}
body{width:800px;height:480px;}
#tip{position:fixed;display:none;z-index:999;background:rgba(255,255,255,0.97);border:1px solid #ddd;border-radius:10px;padding:9px 13px;font-size:12.5px;line-height:1.6;box-shadow:0 6px 24px rgba(0,0,0,.09);pointer-events:none;}
</style></head><body>
<svg id="c" width="800" height="480"></svg><div id="tip"></div>
<script>
const PALETTE={"Humanities":"#3C7C2A","Social Sciences":"#75A93D","STEM":"#B5C941","Other":"#D6A640","Profession":"#DF7A45"};
function hexToRgb(h){h=h.replace("#","");return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function shade(hex,f){const[r,g,b]=hexToRgb(hex);const m=c=>Math.round(c+(255-c)*f);const x=n=>n.toString(16).padStart(2,"0");return"#"+x(m(r))+x(m(g))+x(m(b));}
function darken(hex,f){const[r,g,b]=hexToRgb(hex);const m=c=>Math.round(c*(1-f));const x=n=>n.toString(16).padStart(2,"0");return"#"+x(m(r))+x(m(g))+x(m(b));}
const SVG="http://www.w3.org/2000/svg";
function s(tag,attrs){const e=document.createElementNS(SVG,tag);Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));return e;}
const tip=document.getElementById("tip");
function showTip(html,e){tip.innerHTML=html;tip.style.display="block";tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-8)+"px";}
function moveTip(e){tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-8)+"px";}
function hideTip(){tip.style.display="none";}

const SHOTS=[0,1,3,5];
const MODELS=[
  {name:"LLaMA-3.1-8B",      col:PALETTE["Humanities"],     en:[43.30,44.93,46.09,46.59],ur:[43.84,45.08,46.32,46.10]},
  {name:"Gemma-3-4B-IT",     col:PALETTE["Other"],          en:[43.93,45.91,46.07,46.27],ur:[44.88,46.40,46.36,45.99]},
  {name:"Qwen3-8B",          col:PALETTE["Social Sciences"],en:[50.97,50.23,52.27,53.21],ur:[48.97,51.86,53.24,53.49]},
  {name:"Qwen3-4B-Instruct", col:PALETTE["Profession"],     en:[50.84,52.56,53.40,53.65],ur:[51.70,52.06,52.89,52.94]},
];
const svg=document.getElementById("c");
const W=800,H=480,ML=62,MR=185,MT=55,MB=65;
const CW=W-ML-MR,CH=H-MT-MB;
const YMIN=42,YMAX=56;

for(let v=YMIN;v<=YMAX;v+=2){
  const y=MT+CH*(1-(v-YMIN)/(YMAX-YMIN));
  svg.appendChild(s("line",{x1:ML,y1:y,x2:ML+CW,y2:y,stroke:"#e8e8e8","stroke-width":1,"stroke-dasharray":v===YMIN?"none":"4 3"}));
  const t=s("text",{x:ML-8,y:y+4,"text-anchor":"end","font-size":11,fill:"#888"});t.textContent=v+"%";svg.appendChild(t);
}
SHOTS.forEach(function(sh,i){
  const x=ML+i*(CW/(SHOTS.length-1));
  svg.appendChild(s("line",{x1:x,y1:MT+CH,x2:x,y2:MT+CH+6,stroke:"#ccc","stroke-width":1}));
  const t=s("text",{x:x,y:MT+CH+20,"text-anchor":"middle","font-size":11,fill:"#555"});t.textContent=sh+"-shot";svg.appendChild(t);
});
const yl=s("text",{transform:"rotate(-90)",x:-(MT+CH/2),y:14,"text-anchor":"middle","font-size":11,fill:"#666"});
yl.textContent="Accuracy (%)";svg.appendChild(yl);
const tt=s("text",{x:ML+CW/2,y:28,"text-anchor":"middle","font-size":14,"font-weight":700,fill:"#1a1a1a"});
tt.textContent="Few-Shot Accuracy on UrduMMLU";svg.appendChild(tt);
const st=s("text",{x:ML+CW/2,y:44,"text-anchor":"middle","font-size":11,fill:"#999"});
st.textContent="Solid = English prompt · Dashed = Urdu prompt";svg.appendChild(st);

function px(i){return ML+i*(CW/(SHOTS.length-1));}
function py(v){return MT+CH*(1-(v-YMIN)/(YMAX-YMIN));}

MODELS.forEach(function(m){
  ["en","ur"].forEach(function(lang){
    const pts=m[lang];
    const dash=lang==="ur"?"6 4":"none";
    let d="M";
    pts.forEach(function(v,i){d+=(i?" L ":" ")+px(i).toFixed(1)+" "+py(v).toFixed(1);});
    svg.appendChild(s("path",{d:d,fill:"none",stroke:m.col,"stroke-width":2.2,"stroke-dasharray":dash,"stroke-linejoin":"round","stroke-linecap":"round"}));
    pts.forEach(function(v,i){
      const cx=px(i),cy=py(v);
      const dot=s("circle",{cx:cx,cy:cy,r:4.5,fill:lang==="en"?m.col:shade(m.col,0.35),stroke:m.col,"stroke-width":1.5});
      dot.addEventListener("mouseenter",function(e){showTip("<b style='color:"+darken(m.col,0.4)+"'>"+m.name+"</b><br/>"+(lang==="en"?"English":"Urdu")+" prompt · "+SHOTS[i]+"-shot<br/>Accuracy: <b>"+v.toFixed(2)+"%</b>",e);});
      dot.addEventListener("mousemove",moveTip);dot.addEventListener("mouseleave",hideTip);
      svg.appendChild(dot);
    });
  });
});

const lx=ML+CW+18,ly=MT;
MODELS.forEach(function(m,i){
  const y=ly+i*42;
  svg.appendChild(s("line",{x1:lx,y1:y+8,x2:lx+22,y2:y+8,stroke:m.col,"stroke-width":2.5,"stroke-linecap":"round"}));
  svg.appendChild(s("circle",{cx:lx+11,cy:y+8,r:4,fill:m.col}));
  const nm=s("text",{x:lx+28,y:y+12,"font-size":11,"font-weight":600,fill:darken(m.col,0.38)});nm.textContent=m.name;svg.appendChild(nm);
  svg.appendChild(s("line",{x1:lx,y1:y+26,x2:lx+22,y2:y+26,stroke:m.col,"stroke-width":2,"stroke-dasharray":"6 4","stroke-linecap":"round"}));
  svg.appendChild(s("circle",{cx:lx+11,cy:y+26,r:3.5,fill:shade(m.col,0.35),stroke:m.col,"stroke-width":1.5}));
  const ul=s("text",{x:lx+28,y:y+30,"font-size":10,fill:"#999"});ul.textContent="(Urdu prompt)";svg.appendChild(ul);
});
</script></body></html>
