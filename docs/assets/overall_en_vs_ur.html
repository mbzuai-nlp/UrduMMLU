<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
html,body{margin:0;padding:0;background:transparent;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:#1a1a1a;}
body{width:760px;height:420px;}
#tip{position:fixed;display:none;z-index:999;background:rgba(255,255,255,0.97);border:1px solid #ddd;border-radius:10px;padding:9px 13px;font-size:12.5px;line-height:1.6;box-shadow:0 6px 24px rgba(0,0,0,.09);pointer-events:none;}
</style></head><body>
<svg id="c" width="760" height="420"></svg><div id="tip"></div>
<script>
const PALETTE={"Humanities":"#3C7C2A","Social Sciences":"#75A93D","STEM":"#B5C941","Other":"#D6A640","Profession":"#DF7A45"};
function hexToRgb(h){h=h.replace("#","");return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function shade(hex,f){const[r,g,b]=hexToRgb(hex);const m=c=>Math.round(c+(255-c)*f);const x=n=>n.toString(16).padStart(2,"0");return"#"+x(m(r))+x(m(g))+x(m(b));}
function darken(hex,f){const[r,g,b]=hexToRgb(hex);const m=c=>Math.round(c*(1-f));const x=n=>n.toString(16).padStart(2,"0");return"#"+x(m(r))+x(m(g))+x(m(b));}
const SVG="http://www.w3.org/2000/svg";
function s(tag,attrs){const e=document.createElementNS(SVG,tag);Object.entries(attrs||{}).forEach(([k,v])=>e.setAttribute(k,v));return e;}
const tip=document.getElementById("tip");
function showTip(html,e){tip.innerHTML=html;tip.style.display="block";tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-8)+"px";}
function moveTip(e){tip.style.left=(e.clientX+14)+"px";tip.style.top=(e.clientY-8)+"px";}
function hideTip(){tip.style.display="none";}

const DATA=[
  {model:"Gemini-3.5-Flash",  tier:"Proprietary",      en:90.20,ur:90.34},
  {model:"DeepSeek-V4-Flash", tier:"Open-source >25B", en:82.41,ur:81.42},
  {model:"Gemma-2-9B-IT",     tier:"Open-source ≤25B", en:55.28,ur:56.80},
  {model:"Qalb-1.0-8B",       tier:"Urdu-targeted",    en:34.77,ur:35.52},
];
const C_EN=PALETTE["Humanities"],C_UR=PALETTE["Social Sciences"];
const svg=document.getElementById("c");
const W=760,H=420,ML=60,MR=160,MT=50,MB=88;
const CW=W-ML-MR,CH=H-MT-MB;

for(let v=0;v<=100;v+=20){
  const y=MT+CH*(1-v/100);
  svg.appendChild(s("line",{x1:ML,y1:y,x2:ML+CW,y2:y,stroke:"#e8e8e8","stroke-width":1,"stroke-dasharray":v===0?"none":"4 3"}));
  const t=s("text",{x:ML-8,y:y+4,"text-anchor":"end","font-size":11,fill:"#888"});t.textContent=v+"%";svg.appendChild(t);
}
const yl=s("text",{transform:"rotate(-90)",x:-(MT+CH/2),y:14,"text-anchor":"middle","font-size":11,fill:"#666"});
yl.textContent="Overall accuracy (%)";svg.appendChild(yl);
const tt=s("text",{x:ML+CW/2,y:28,"text-anchor":"middle","font-size":14,"font-weight":700,fill:"#1a1a1a"});
tt.textContent="Overall Accuracy: English vs. Urdu Prompt";svg.appendChild(tt);

const BW=36,GAP=8,GW=BW*2+GAP,GSPACE=52;
const TW=DATA.length*(GW+GSPACE)-GSPACE;
const startX=ML+(CW-TW)/2;
DATA.forEach(function(d,i){
  const gx=startX+i*(GW+GSPACE);
  [[d.en,C_EN,"English prompt"],[d.ur,C_UR,"Urdu prompt"]].forEach(function(arr,j){
    const v=arr[0],col=arr[1],label=arr[2];
    const bh=CH*(v/100),by=MT+CH-bh,bx=gx+j*(BW+GAP);
    const r=s("rect",{x:bx,y:by,width:BW,height:bh,rx:5,fill:shade(col,0.3),stroke:darken(col,0.15),"stroke-width":1.5});
    r.addEventListener("mouseenter",function(e){showTip("<b style='color:"+darken(col,0.4)+"'>"+label+"</b><br/>"+d.model+"<br/>Accuracy: <b>"+v.toFixed(2)+"%</b>",e);});
    r.addEventListener("mousemove",moveTip);r.addEventListener("mouseleave",hideTip);
    svg.appendChild(r);
    const vl=s("text",{x:bx+BW/2,y:by-5,"text-anchor":"middle","font-size":10.5,"font-weight":600,fill:darken(col,0.35)});
    vl.textContent=v.toFixed(1);svg.appendChild(vl);
  });
  const xl=s("text",{x:gx+GW/2,y:MT+CH+18,"text-anchor":"middle","font-size":11,fill:"#333"});
  xl.textContent=d.model.replace("Gemini-3.5-Flash","Gemini 3.5").replace("DeepSeek-V4-Flash","DeepSeek V4");svg.appendChild(xl);
  const tl=s("text",{x:gx+GW/2,y:MT+CH+32,"text-anchor":"middle","font-size":9.5,fill:"#999"});
  tl.textContent=d.tier;svg.appendChild(tl);
});

const lx=ML+CW+18,ly=MT+20;
[[C_EN,"English prompt"],[C_UR,"Urdu prompt"]].forEach(function(arr,i){
  const col=arr[0],label=arr[1];
  svg.appendChild(s("rect",{x:lx,y:ly+i*26,width:14,height:14,rx:4,fill:shade(col,0.3),stroke:darken(col,0.15),"stroke-width":1.5}));
  const lt=s("text",{x:lx+20,y:ly+i*26+11,"font-size":12,fill:darken(col,0.4),"font-weight":600});lt.textContent=label;svg.appendChild(lt);
});
</script></body></html>
